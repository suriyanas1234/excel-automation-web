<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Production Filter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            margin-bottom: 20px;
        }

        .file-input-wrapper input[type="file"] {
            display: none;
        }

        .file-label {
            display: block;
            padding: 30px;
            background: #f5f5f5;
            border: 2px dashed #667eea;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            color: #667eea;
        }

        .file-label:hover {
            background: #efefff;
            border-color: #764ba2;
        }

        .file-name {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-download {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-download:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-download:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-reset {
            background: #f44336;
            color: white;
        }

        .btn-reset:hover {
            background: #da190b;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(244, 67, 54, 0.3);
        }

        .status {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .results-section {
            display: none;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 2px solid #eee;
        }

        .results-section.show {
            display: block;
        }

        .results-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .result-stat {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            color: #666;
            font-size: 13px;
        }

        .result-stat span:last-child {
            font-weight: 600;
            color: #333;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 20px;
            }

            .button-group {
                flex-direction: column;
            }

            .file-label {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Excel Filter</h1>
        <p class="subtitle">Upload, filter, and download</p>

        <div class="status" id="status"></div>

        <div class="file-input-wrapper">
            <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" />
            <label for="fileInput" class="file-label">
                📁 Click or drag & drop Excel file
                <div class="file-name">Supported: .xlsx, .xls, .csv</div>
            </label>
        </div>

        <div class="button-group">
            <button class="btn-download" id="downloadBtn" disabled>⬇️ Download</button>
            <button class="btn-reset" id="resetBtn">🔄 Reset</button>
        </div>

        <div class="results-section" id="resultsSection">
            <h3>✅ Processing Complete</h3>
            <div class="result-stat">
                <span>Original Rows:</span>
                <span id="originalRows">0</span>
            </div>
            <div class="result-stat">
                <span>Filtered Rows:</span>
                <span id="filteredRows">0</span>
            </div>
            <div class="result-stat">
                <span>Rows Removed:</span>
                <span id="removedRows">0</span>
            </div>
        </div>
    </div>

    <script src="filter.js"></script>
</body>
</html>
